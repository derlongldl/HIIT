<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>跑步教練 V5.5.1 - 防呆報警版</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root { --primary: #ff6a00; --bg: #f0f2f5; --card: #ffffff; --danger: #e74c3c; --success: #2ecc71; --info: #3498db; --dark: #2c3e50; --note: #9b59b6; }
body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 5px; }
.card { background: var(--card); border-radius: 12px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
h2 { text-align:center; color:var(--primary); margin:5px 0; font-size: 1.2rem; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { background: #f8f9fa; padding: 8px 2px; border: 1px solid #dee2e6; color: #555; }
td { padding: 6px 2px; border: 1px solid #dee2e6; text-align: center; }
input { width: 90%; padding: 8px 0; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
.pace-text { color: var(--primary); font-weight: bold; font-family: monospace; font-size: 1.2rem; } /* 再放大 */
.big-val { font-size: 6.5rem; font-weight: 900; color: var(--primary); font-family: monospace; line-height: 1; margin: 10px 0; }
.btn-action { flex: 1; padding: 18px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; color: #fff; cursor: pointer; }

#modeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 50000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
.btn-mode { width: 80%; padding: 40px 20px; font-size: 1.5rem; font-weight: bold; color: white; border: none; border-radius: 20px; }

#trainingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
#noteModal, #mapModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 30000; justify-content: center; align-items: center; }
#map { flex: 1; width: 100%; background: white; }
.history-card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
.history-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.btn-sm { flex: 1; min-width: 50px; padding: 10px 2px; font-size: 11px; border-radius: 6px; border: none; color: white; font-weight: bold; }
.control-row { padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
#lockOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; flex-direction: column; justify-content: center; align-items: center; }
</style>
</head>
<body>

<div id="modeOverlay">
    <h2>🏃 請選擇模式</h2>
    <button class="btn-mode" style="background: var(--primary);" onclick="selectMode('interval')">亞索 800 (間歇)</button>
    <button class="btn-mode" style="background: var(--info);" onclick="selectMode('general')">一般練跑</button>
</div>

<div id="mapModal" style="background:white; flex-direction:column;"><div id="map"></div><button onclick="closeMap()" style="padding:15px; width:100%; background:#444; color:white; border:none;">關閉</button></div>

<div id="trainingOverlay">
    <div id="lockOverlay"><div style="border:3px solid var(--primary); padding:30px; border-radius:50px; font-size:1.5rem;">🔒 長按解鎖</div></div>
    <div id="statusTop" style="font-size:2.5rem; color:var(--success); font-weight:bold;">● 準備中</div>
    <div id="phaseDetail" style="font-size:1.4rem; color:#ffeb3b; margin: 10px 0;">--</div>
    <div id="bigDistance" class="big-val">0.000</div>
    <div id="soundIndicator" style="color:var(--info); margin-bottom:10px;">GPS 監測中...</div>
    <div style="display:flex; width:100%; justify-content:space-around; margin: 15px 0;">
        <div><div style="color:#888; font-size:0.9rem;">配速</div><div id="bigPace" style="font-size:2.5rem; font-family:monospace;">--:--</div></div>
        <div><div style="color:#888; font-size:0.9rem;">時間</div><div id="bigElapsed" style="font-size:2.5rem; font-family:monospace;">00:00</div></div>
    </div>
    <button class="btn-action" style="background:var(--danger);" onclick="stopAndSave()">結束儲存</button>
</div>

<div class="card">
  <h2 id="appTitle">🏃 跑步教練 V5.5.1</h2>
  
  <div id="intervalTable" style="display:none;">
      <table>
        <thead><tr><th>階段</th><th>BPM</th><th>秒數</th><th>距離(m)</th><th>跑速</th></tr></thead>
        <tbody id="configRows"></tbody>
      </table>
      <div class="control-row">
        <span>循環組數：<input id="loopCount" type="number" oninput="uiUpdate()" style="width:45px;"></span>
        <span style="font-size:12px; text-align:right;">預計：<b id="totalPlanTime">0</b>分 / <b id="totalPlanDist">0</b>km</span>
      </div>
  </div>

  <div id="generalTable" style="display:none;">
      <div style="background:#f8f9fa; padding:10px; border-radius:8px;">
          <table style="table-layout: auto;">
              <tr><td><b>節拍 (BPM)</b></td><td><input type="number" id="genBPM" oninput="uiUpdate()"></td></tr>
              <tr><td><b>秒數 (sec)</b></td><td><input type="number" id="genSec" oninput="uiUpdate()"></td></tr>
              <tr><td><b>距離 (m)</b></td><td><input type="number" id="genDist" oninput="uiUpdate()"></td></tr>
              <tr><td><b>預計跑速</b></td><td class="pace-text" id="genPaceText">--</td></tr>
          </table>
      </div>
  </div>

  <div class="control-row" style="border-top:1px dashed #eee; margin-top:10px;">
    <span>GPS門檻：<b id="baseThresDisp">0.32</b>m</span>
    <div><button onclick="adjThres(-1)">－</button><button onclick="adjThres(1)">＋</button></div>
  </div>
  
  <div style="display:flex; gap:10px; margin-top:10px;">
      <button onclick="toggleStart(true)" class="btn-action" style="background:var(--primary);">1 達標儲存</button>
      <button onclick="toggleStart(false)" class="btn-action" style="background:var(--info);">2 達標續跑</button>
  </div>
</div>

<div class="card"><strong>歷史紀錄</strong><div id="historyContainer"></div></div>

<script>
const CONFIG_KEY = 'run_config_v551';
const HISTORY_KEY = 'run_history_v464';
const PHASES = ["熱身", "間歇", "衝刺", "恢復", "舒緩"];
let currentMode = 'interval';
let config = { bpm:[180,205,215,195,180], sec:[180,60,60,120,180], dist:[400,400,400,400,400], loops:8, threshold:0.32, genBPM:180, genSec:1200, genDist:3000 };
let isRunning = false, totalDist = 0, elapsedSec = 0, audioCtx = null, timerId = null, watchId = null, trackPoints = [];
let lastDistCheck = 0, distStallCount = 0; // 用於里程停滯偵測

function selectMode(m) {
    currentMode = m;
    document.getElementById('modeOverlay').style.display = 'none';
    document.getElementById('intervalTable').style.display = (m === 'interval') ? 'block' : 'none';
    document.getElementById('generalTable').style.display = (m === 'general') ? 'block' : 'none';
    uiUpdate();
}

function init() {
    const saved = localStorage.getItem(CONFIG_KEY);
    if(saved) Object.assign(config, JSON.parse(saved));
    let html = "";
    PHASES.forEach((p, i) => {
        html += `<tr><td><b>${p}</b></td><td><input type="number" id="bpm_${i}" oninput="uiUpdate()"></td><td><input type="number" id="sec_${i}" oninput="uiUpdate()"></td><td><input type="number" id="dist_${i}" oninput="uiUpdate()"></td><td class="pace-text" id="pace_${i}">--</td></tr>`;
    });
    document.getElementById('configRows').innerHTML = html;
    PHASES.forEach((p, i) => {
        document.getElementById(`bpm_${i}`).value = config.bpm[i];
        document.getElementById(`sec_${i}`).value = config.sec[i];
        document.getElementById(`dist_${i}`).value = config.dist[i];
    });
    document.getElementById('loopCount').value = config.loops;
    document.getElementById('genBPM').value = config.genBPM;
    document.getElementById('genSec').value = config.genSec;
    document.getElementById('genDist').value = config.genDist;
    uiUpdate(); renderHistory();
}

function uiUpdate() {
    PHASES.forEach((p, i) => {
        config.bpm[i] = +document.getElementById(`bpm_${i}`).value;
        config.sec[i] = +document.getElementById(`sec_${i}`).value;
        config.dist[i] = +document.getElementById(`dist_${i}`).value;
        if(config.sec[i] > 0 && config.dist[i] > 0) document.getElementById(`pace_${i}`).innerText = formatTime(Math.floor(config.sec[i]/(config.dist[i]/1000)));
    });
    config.genBPM = +document.getElementById('genBPM').value;
    config.genSec = +document.getElementById('genSec').value;
    config.genDist = +document.getElementById('genDist').value;
    config.loops = +document.getElementById('loopCount').value;
    if(config.genSec > 0 && config.genDist > 0) document.getElementById('genPaceText').innerText = formatTime(Math.floor(config.genSec/(config.genDist/1000)));

    let tT = config.sec[0] + ((config.sec[1]+config.sec[2]+config.sec[3])*config.loops) + config.sec[4];
    let tD = config.dist[0] + ((config.dist[1]+config.dist[2]+config.dist[3])*config.loops) + config.dist[4];
    document.getElementById('totalPlanTime').innerText = (tT/60).toFixed(1);
    document.getElementById('totalPlanDist').innerText = (tD/1000).toFixed(2);
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
}

async function toggleStart(isAuto) {
    isRunning = true; totalDist = 0; elapsedSec = 0; trackPoints = [];
    lastDistCheck = 0; distStallCount = 0;
    document.getElementById('trainingOverlay').style.display = 'flex';
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    timerId = setInterval(() => {
        elapsedSec++;
        document.getElementById('bigElapsed').innerText = formatTime(elapsedSec);
        // 核心：里程停滯監測 (每 1 秒檢查一次)
        if (totalDist <= lastDistCheck && elapsedSec > 10) { 
            distStallCount++;
            if (distStallCount >= 5) { // 連續 5 秒里程沒動
                triggerAlarm(); 
                distStallCount = 0; 
            }
        } else {
            lastDistCheck = totalDist;
            distStallCount = 0;
        }
    }, 1000);
    
    startGPS();

    if(currentMode === 'interval') {
        await runPhase(0, "熱身", config.sec[0], config.bpm[0]);
        for(let j=0; j<config.loops; j++) {
            if(!isRunning) break;
            await runPhase(1, `間歇 ${j+1}`, config.sec[1], config.bpm[1]);
            await runPhase(2, `衝刺 ${j+1}`, config.sec[2], config.bpm[2]);
            await runPhase(3, `恢復 ${j+1}`, config.sec[3], config.bpm[3]);
        }
        if(isRunning) await runPhase(4, "舒緩", config.sec[4], config.bpm[4]);
    } else {
        document.getElementById('statusTop').innerText = "● 一般練跑";
        let end = Date.now() + config.genSec * 1000;
        while(isRunning && (Date.now() < end)) {
            document.getElementById('phaseDetail').innerText = `目標: ${config.genDist}m | 剩餘 ${Math.round((end-Date.now())/1000)}s`;
            await playBeep(config.genBPM, 0);
        }
    }
    if(isRunning && isAuto) stopAndSave();
}

async function runPhase(idx, label, sec, bpm) {
    if(!isRunning) return;
    document.getElementById('statusTop').innerText = "● " + label;
    let end = Date.now() + sec * 1000;
    while(Date.now() < end && isRunning) {
        document.getElementById('phaseDetail').innerText = `節拍: ${bpm} | 剩餘 ${Math.round((end-Date.now())/1000)}s`;
        await playBeep(bpm, idx);
    }
}

async function playBeep(bpm, phaseIdx) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    let km = Math.floor(totalDist / 1000);
    let isOdd = (phaseIdx % 2 === 0);
    if (km % 2 !== 0) isOdd = !isOdd;
    
    o.type = 'square';
    o.frequency.setValueAtTime(isOdd ? 600 : 1000, audioCtx.currentTime);
    g.gain.setValueAtTime(isOdd ? 0.6 : 0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    
    document.getElementById('soundIndicator').innerText = `第 ${km+1}k (${isOdd?'低音':'高音'})`;
    o.start(); o.stop(audioCtx.currentTime + 0.1);
    await new Promise(r => setTimeout(r, 60000/bpm));
}

function triggerAlarm() {
    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
    // 播放一個刺耳的提示音
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 1500;
    g.gain.value = 0.5;
    o.start(); o.stop(audioCtx.currentTime + 0.5);
    document.getElementById('soundIndicator').innerText = "⚠️ 里程停滯警告！";
}

function startGPS() {
    watchId = navigator.geolocation.watchPosition(p => {
        if(p.coords.accuracy < 60) {
            if(trackPoints.length > 0) {
                let last = trackPoints[trackPoints.length-1];
                let d = haversine(last.lat, last.lon, p.coords.latitude, p.coords.longitude);
                if(d > config.threshold && d < 50) {
                    totalDist += d;
                    document.getElementById('bigDistance').innerText = (totalDist/1000).toFixed(3);
                    document.getElementById('bigPace').innerText = formatTime(Math.floor(elapsedSec/(totalDist/1000)));
                }
            }
            trackPoints.push({lat: p.coords.latitude, lon: p.coords.longitude});
        }
    }, null, {enableHighAccuracy:true});
}

function stopAndSave() {
    isRunning = false; clearInterval(timerId); navigator.geolocation.clearWatch(watchId);
    if(totalDist > 0) {
        const recs = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        recs.unshift({ id: Date.now(), date: new Date().toLocaleString(), dist: (totalDist/1000).toFixed(3), time: formatTime(elapsedSec), points: trackPoints, threshold: config.threshold.toFixed(2), note: "模式: " + currentMode });
        localStorage.setItem(HISTORY_KEY, JSON.stringify(recs));
    }
    location.reload();
}

function renderHistory() {
    const recs = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    document.getElementById('historyContainer').innerHTML = recs.map(r => `
        <div class="history-card">
            <b>🏃 ${r.dist} km | ${r.time}</b> (${r.date})
            <div class="history-btns">
                <button class="btn-sm" style="background:var(--info);" onclick="viewTrack(${r.id})">軌跡</button>
                <button class="btn-sm" style="background:var(--success);" onclick="editDist(${r.id})">修正</button>
                <button class="btn-sm" style="background:var(--danger);" onclick="deleteRec(${r.id})">刪除</button>
            </div>
        </div>
    `).join('');
}

function viewTrack(id) {
    const r = JSON.parse(localStorage.getItem(HISTORY_KEY)).find(r => r.id === id);
    document.getElementById('mapModal').style.display = 'flex';
    setTimeout(() => {
        if (!map) { map = L.map('map').setView([r.points[0].lat, r.points[0].lon], 16); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
        map.invalidateSize();
        if (polyline) map.removeLayer(polyline);
        polyline = L.polyline(r.points.map(p => [p.lat, p.lon]), { color: '#ff6a00', weight: 5 }).addTo(map);
        map.fitBounds(polyline.getBounds());
    }, 300);
}
function closeMap() { document.getElementById('mapModal').style.display = 'none'; }
function editDist(id) { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)); let idx = recs.findIndex(r => r.id === id); let newVal = prompt("修正里程 (km):", recs[idx].dist); if(newVal) { recs[idx].dist = parseFloat(newVal).toFixed(3); localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); renderHistory(); } }
function deleteRec(id) { if(confirm("刪除？")) { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)).filter(r => r.id !== id); localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); renderHistory(); } }
function adjThres(v) { config.threshold = Math.max(0.01, config.threshold + v*0.01); uiUpdate(); }
function formatTime(s) { if(!s||s<=0) return "00:00"; return Math.floor(s/60).toString().padStart(2,'0')+":"+(s%60).toString().padStart(2,'0'); }
function haversine(lat1,lon1,lat2,lon2) { const R=6371000; const dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
window.onload = init;
let map=null, polyline=null;
</script>
</body>
</html>
