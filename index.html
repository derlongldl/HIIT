<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>跑步教練 V5.5.4 - 終極穩定版</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root { --primary: #ff6a00; --bg: #f0f2f5; --card: #ffffff; --danger: #e74c3c; --success: #2ecc71; --info: #3498db; --dark: #2c3e50; --note: #9b59b6; }
body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 5px; }
.card { background: var(--card); border-radius: 12px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
h2 { text-align:center; color:var(--primary); margin:5px 0; font-size: 1.2rem; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { background: #f8f9fa; padding: 8px 2px; border: 1px solid #dee2e6; color: #555; }
td { padding: 6px 2px; border: 1px solid #dee2e6; text-align: center; }
input { width: 90%; padding: 8px 0; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
.pace-text { color: var(--primary); font-weight: bold; font-family: monospace; font-size: 1.25rem; }
.big-val { font-size: 6rem; font-weight: 900; color: var(--primary); font-family: monospace; line-height: 1; margin: 10px 0; }
.btn-action { padding: 18px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; color: #fff; cursor: pointer; }
.btn-block { width: 100%; display: block; }

#modeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 50000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
.btn-mode { width: 80%; padding: 40px 20px; font-size: 1.5rem; font-weight: bold; color: white; border: none; border-radius: 20px; }

#trainingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
.bottom-bar { position: absolute; bottom: 30px; left: 20px; right: 20px; }

#mapModal, #noteModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 30000; justify-content: center; align-items: center; }
#map { width: 100%; height: 80%; background: white; }
.note-box { background: white; width: 85%; border-radius: 15px; padding: 20px; color: #333; }
#noteArea { width: 100%; height: 120px; margin-top: 10px; padding: 8px; font-size: 14px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

.history-card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
.history-btns { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.btn-sm { flex: 1; min-width: 55px; padding: 8px 2px; font-size: 11px; border-radius: 6px; border: none; color: white; font-weight: bold; }
</style>
</head>
<body>

<div id="modeOverlay">
    <h2>🏃 請選擇跑步模式</h2>
    <button class="btn-mode" style="background: var(--primary);" onclick="selectMode('interval')">亞索 800 (間歇)</button>
    <button class="btn-mode" style="background: var(--info);" onclick="selectMode('general')">一般練跑模式</button>
</div>

<div id="noteModal"><div class="note-box"><h3>📝 訓練備註</h3><textarea id="noteArea"></textarea><div style="display:flex; gap:10px; margin-top:15px;"><button onclick="closeNote()" style="flex:1; padding:10px;">取消</button><button onclick="saveNote()" style="flex:1; padding:10px; background:var(--success); color:white; border:none; border-radius:8px;">儲存</button></div></div></div>

<div id="mapModal" style="flex-direction:column;"><div id="map"></div><button onclick="closeMap()" style="padding:15px; width:100%; background:#444; color:white; border:none;">關閉軌跡</button></div>

<div id="trainingOverlay">
    <div id="statusTop" style="font-size:2.5rem; color:var(--success); font-weight:bold;">● 準備中</div>
    <div id="phaseDetail" style="font-size:1.4rem; color:#ffeb3b; margin: 10px 0;">--</div>
    <div id="bigDistance" class="big-val">0.000</div>
    <div id="soundIndicator" style="color:var(--info); margin-bottom:10px;">等待 GPS 訊號...</div>
    <div style="display:flex; width:100%; justify-content:space-around; margin: 15px 0;">
        <div><div style="color:#888; font-size:0.9rem;">目前配速</div><div id="bigPace" style="font-size:2.5rem; font-family:monospace;">--:--</div></div>
        <div><div style="color:#888; font-size:0.9rem;">跑步時間</div><div id="bigElapsed" style="font-size:2.5rem; font-family:monospace;">00:00</div></div>
    </div>
    <div class="bottom-bar">
        <button class="btn-action btn-block" style="background:var(--danger);" onclick="stopAndSave()">■ 結束並儲存紀錄</button>
    </div>
</div>

<div class="card">
  <h2 id="appTitle">跑步教練 V5.5.4</h2>
  
  <div id="intervalTable" style="display:none;">
      <table>
        <thead><tr><th>階段</th><th>BPM</th><th>秒數</th><th>距離(m)</th><th>跑速</th></tr></thead>
        <tbody id="configRows"></tbody>
      </table>
      <div class="control-row" style="display:flex; justify-content:space-between; margin:10px 0;">
        <span>循環：<input id="loopCount" type="number" oninput="uiUpdate()" style="width:40px;"> 組</span>
        <span style="font-size:12px;">預計：<b id="totalPlanTime">0</b>分 / <b id="totalPlanDist">0</b>km</span>
      </div>
  </div>

  <div id="generalTable" style="display:none;">
      <div style="background:#f8f9fa; padding:10px; border-radius:10px;">
          <table style="table-layout: auto;">
              <tr><td><b>節拍(BPM)</b></td><td><input type="number" id="genBPM" oninput="uiUpdate()"></td></tr>
              <tr><td><b>預計(sec)</b></td><td><input type="number" id="genSec" oninput="uiUpdate()"></td></tr>
              <tr><td><b>距離(m)</b></td><td><input type="number" id="genDist" oninput="uiUpdate()"></td></tr>
              <tr><td><b>預計跑速</b></td><td class="pace-text" id="genPaceText">--</td></tr>
          </table>
      </div>
  </div>

  <div class="control-row" style="border-top:1px dashed #eee; margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
    <span>GPS門檻：<b id="baseThresDisp">0.32</b>m</span>
    <div><button onclick="adjThres(-1)" style="padding:5px 12px;">－</button><button onclick="adjThres(1)" style="padding:5px 12px;">＋</button></div>
  </div>
  
  <div style="display:flex; gap:10px; margin-top:10px;">
      <button onclick="toggleStart(true)" class="btn-action" style="background:var(--primary); flex:1;">1 達標儲存</button>
      <button onclick="toggleStart(false)" class="btn-action" style="background:var(--info); flex:1;">2 達標續跑</button>
  </div>
  <button onclick="resetMode()" style="width:100%; margin-top:15px; padding:5px; background:none; border:none; color:#888; text-decoration:underline; font-size:12px; cursor:pointer;">↺ 切換訓練模式</button>
</div>

<div class="card"><strong>歷史紀錄</strong><div id="historyContainer"></div></div>

<script>
const CONFIG_KEY = 'run_config_v554';
const HISTORY_KEY = 'run_history_v464';
const PHASES = ["熱身", "間歇", "衝刺", "恢復", "舒緩"];
let currentMode = null; 
let config = { bpm:[180,205,215,195,180], sec:[180,60,60,120,180], dist:[400,400,400,400,400], loops:8, threshold:0.32, genBPM:180, genSec:1200, genDist:3000 };
let isRunning = false, totalDist = 0, elapsedSec = 0, audioCtx = null, timerId = null, watchId = null, trackPoints = [];
let lastDistCheck = 0, distStallCount = 0;
let currentSoundType = true;
let startNote = { location: "未偵測", weather: "未偵測" };

function selectMode(m) {
    currentMode = m;
    localStorage.setItem('last_mode_v5', m);
    document.getElementById('modeOverlay').style.display = 'none';
    document.getElementById('intervalTable').style.display = (m === 'interval') ? 'block' : 'none';
    document.getElementById('generalTable').style.display = (m === 'general') ? 'block' : 'none';
    uiUpdate();
}

function resetMode() { 
    localStorage.removeItem('last_mode_v5');
    document.getElementById('modeOverlay').style.display = 'flex'; 
}

function init() {
    const saved = localStorage.getItem(CONFIG_KEY);
    if(saved) Object.assign(config, JSON.parse(saved));
    let html = "";
    PHASES.forEach((p, i) => {
        html += `<tr><td><b>${p}</b></td><td><input type="number" id="bpm_${i}" oninput="uiUpdate()"></td><td><input type="number" id="sec_${i}" oninput="uiUpdate()"></td><td><input type="number" id="dist_${i}" oninput="uiUpdate()"></td><td class="pace-text" id="pace_${i}">--</td></tr>`;
    });
    document.getElementById('configRows').innerHTML = html;
    PHASES.forEach((p, i) => {
        document.getElementById(`bpm_${i}`).value = config.bpm[i];
        document.getElementById(`sec_${i}`).value = config.sec[i];
        document.getElementById(`dist_${i}`).value = config.dist[i];
    });
    document.getElementById('loopCount').value = config.loops;
    document.getElementById('genBPM').value = config.genBPM;
    document.getElementById('genSec').value = config.genSec;
    document.getElementById('genDist').value = config.genDist;
    
    // 啟動檢測模式
    const lastM = localStorage.getItem('last_mode_v5');
    if(lastM) { selectMode(lastM); } else { resetMode(); }
    
    uiUpdate(); renderHistory();
}

function uiUpdate() {
    PHASES.forEach((p, i) => {
        config.bpm[i] = +document.getElementById(`bpm_${i}`).value;
        config.sec[i] = +document.getElementById(`sec_${i}`).value;
        config.dist[i] = +document.getElementById(`dist_${i}`).value;
        if(config.sec[i] > 0 && config.dist[i] > 0) document.getElementById(`pace_${i}`).innerText = formatTime(Math.floor(config.sec[i]/(config.dist[i]/1000)));
    });
    config.genBPM = +document.getElementById('genBPM').value;
    config.genSec = +document.getElementById('genSec').value;
    config.genDist = +document.getElementById('genDist').value;
    config.loops = +document.getElementById('loopCount').value;
    if(config.genSec > 0 && config.genDist > 0) document.getElementById('genPaceText').innerText = formatTime(Math.floor(config.genSec/(config.genDist/1000)));
    
    document.getElementById('baseThresDisp').innerText = config.threshold.toFixed(2);
    let tT = config.sec[0] + ((config.sec[1]+config.sec[2]+config.sec[3])*config.loops) + config.sec[4];
    let tD = config.dist[0] + ((config.dist[1]+config.dist[2]+config.dist[3])*config.loops) + config.dist[4];
    document.getElementById('totalPlanTime').innerText = (tT/60).toFixed(1);
    document.getElementById('totalPlanDist').innerText = (tD/1000).toFixed(2);
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
}

async function toggleStart(isAuto) {
    isRunning = true; totalDist = 0; elapsedSec = 0; trackPoints = []; lastDistCheck = 0; distStallCount = 0;
    document.getElementById('trainingOverlay').style.display = 'flex';
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    timerId = setInterval(() => {
        elapsedSec++;
        document.getElementById('bigElapsed').innerText = formatTime(elapsedSec);
        // 螢幕關閉監測：5秒里程沒動就報警
        if (totalDist <= lastDistCheck && elapsedSec > 10) { 
            distStallCount++;
            if (distStallCount >= 5) { triggerAlarm(); distStallCount = 0; }
        } else { lastDistCheck = totalDist; distStallCount = 0; }
    }, 1000);
    
    startGPS();

    if(currentMode === 'interval') {
        await runPhase("熱身", config.sec[0], config.bpm[0]);
        for(let j=0; j<config.loops; j++) {
            if(!isRunning) break;
            await runPhase(`間歇(${j+1}/${config.loops})`, config.sec[1], config.bpm[1]);
            await runPhase(`衝刺(${j+1}/${config.loops})`, config.sec[2], config.bpm[2]);
            await runPhase(`恢復(${j+1}/${config.loops})`, config.sec[3], config.bpm[3]);
        }
        if(isRunning) await runPhase("舒緩", config.sec[4], config.bpm[4]);
    } else {
        document.getElementById('statusTop').innerText = "● 一般練跑";
        let end = Date.now() + config.genSec * 1000;
        while(isRunning && (Date.now() < end || !isAuto)) {
            let rem = Math.max(0, Math.round((end - Date.now())/1000));
            document.getElementById('phaseDetail').innerText = `目標:${config.genDist}m | 剩:${rem}s`;
            await playBeep(config.genBPM);
            if(isAuto && totalDist >= config.genDist) break;
        }
    }
    if(isRunning) {
        if(isAuto) stopAndSave();
        else {
            document.getElementById('statusTop').innerText = "● 續跑中";
            let lastBPM = currentMode === 'interval' ? config.bpm[4] : config.genBPM;
            while(isRunning) { await playBeep(lastBPM); }
        }
    }
}

async function runPhase(label, sec, bpm) {
    if(!isRunning) return;
    document.getElementById('statusTop').innerText = "● " + label;
    currentSoundType = !currentSoundType; // 階段對調
    let end = Date.now() + sec * 1000;
    while(Date.now() < end && isRunning) {
        let rem = Math.max(0, Math.round((end - Date.now())/1000));
        document.getElementById('phaseDetail').innerText = `節拍:${bpm} | 剩:${rem}s`;
        await playBeep(bpm);
    }
}

async function playBeep(bpm) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(currentSoundType ? 850 : 1150, audioCtx.currentTime);
    g.gain.setValueAtTime(currentSoundType ? 0.5 : 0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    o.start(); o.stop(audioCtx.currentTime + 0.1);
    document.getElementById('soundIndicator').innerText = `音效:${currentSoundType?'A1':'A2'} | 里程:${(totalDist/1000).toFixed(2)}k`;
    await new Promise(r => setTimeout(r, 60000/bpm));
}

function triggerAlarm() {
    if (navigator.vibrate) navigator.vibrate([600, 200, 600]);
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 1600; o.type = 'sawtooth';
    g.gain.value = 0.6;
    o.start(); o.stop(audioCtx.currentTime + 0.6);
    document.getElementById('soundIndicator').innerText = "⚠️ 警報：GPS 停滯中";
}

function startGPS() {
    watchId = navigator.geolocation.watchPosition(p => {
        const { latitude: lat, longitude: lon, accuracy } = p.coords;
        if(accuracy < 60) {
            if(trackPoints.length === 0) {
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`).then(res=>res.json()).then(d=>startNote.location=d.display_name.split(',')[0]);
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`).then(res=>res.json()).then(d=>startNote.weather=`氣溫 ${d.current_weather.temperature}°C`);
            } else {
                let last = trackPoints[trackPoints.length-1];
                let d = haversine(last.lat, last.lon, lat, lon);
                if(d > config.threshold && d < 50) {
                    totalDist += d;
                    document.getElementById('bigDistance').innerText = (totalDist/1000).toFixed(3);
                    if(totalDist > 10) document.getElementById('bigPace').innerText = formatTime(Math.floor(elapsedSec/(totalDist/1000)));
                }
            }
            trackPoints.push({lat, lon, time: new Date().toISOString()});
        }
    }, null, {enableHighAccuracy:true});
}

function stopAndSave() {
    isRunning = false; clearInterval(timerId); navigator.geolocation.clearWatch(watchId);
    if(totalDist > 0) {
        const recs = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        recs.unshift({ id: Date.now(), date: new Date().toLocaleString(), dist: (totalDist/1000).toFixed(3), time: formatTime(elapsedSec), points: trackPoints, note: `📍 起點：${startNote.location}\n☀️ 天氣：${startNote.weather}` });
        localStorage.setItem(HISTORY_KEY, JSON.stringify(recs));
    }
    document.getElementById('trainingOverlay').style.display = 'none';
    renderHistory();
}

function renderHistory() {
    const recs = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    document.getElementById('historyContainer').innerHTML = recs.map(r => `
        <div class="history-card">
            <b>🏃 ${r.dist} km | ${r.time}</b> (${r.date})
            <div style="font-size:11px; color:#666; margin:5px 0; white-space:pre-wrap;">${r.note || '無備註'}</div>
            <div class="history-btns">
                <button class="btn-sm" style="background:var(--info);" onclick="viewTrack(${r.id})">軌跡</button>
                <button class="btn-sm" style="background:var(--note);" onclick="editNote(${r.id})">備註</button>
                <button class="btn-sm" style="background:var(--success);" onclick="editDist(${r.id})">修正</button>
                <button class="btn-sm" style="background:var(--dark);" onclick="exportGPX(${r.id})">匯出</button>
                <button class="btn-sm" style="background:var(--danger);" onclick="deleteRec(${r.id})">刪除</button>
            </div>
        </div>
    `).join('');
}

let curEditId = null;
function editNote(id) { curEditId = id; const r = JSON.parse(localStorage.getItem(HISTORY_KEY)).find(x=>x.id===id); document.getElementById('noteArea').value = r.note||""; document.getElementById('noteModal').style.display='flex'; }
function saveNote() { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)); recs.find(x=>x.id===curEditId).note = document.getElementById('noteArea').value; localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); closeNote(); renderHistory(); }
function closeNote() { document.getElementById('noteModal').style.display='none'; }
function editDist(id) { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)); let idx = recs.findIndex(x => x.id === id); let newVal = prompt("修正里程 (km):", recs[idx].dist); if(newVal) { recs[idx].dist = parseFloat(newVal).toFixed(3); localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); renderHistory(); } }
function exportGPX(id) {
    const r = JSON.parse(localStorage.getItem(HISTORY_KEY)).find(x=>x.id===id);
    let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="RunCoach"><trk><trkseg>`;
    r.points.forEach(p => { gpx += `<trkpt lat="${p.lat}" lon="${p.lon}"><time>${p.time}</time></trkpt>`; });
    gpx += `</trkseg></trk></gpx>`;
    const blob = new Blob([gpx], {type: 'application/gpx+xml'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Run_${r.id}.gpx`; a.click();
}

function adjThres(v) { config.threshold = Math.max(0.01, config.threshold + v*0.01); uiUpdate(); }
function formatTime(s) { if(!s||s<=0) return "00:00"; return Math.floor(s/60).toString().padStart(2,'0')+":"+(s%60).toString().padStart(2,'0'); }
function haversine(lat1,lon1,lat2,lon2) { const R=6371000; const dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }

let map=null, polyline=null;
function viewTrack(id) {
    const r = JSON.parse(localStorage.getItem(HISTORY_KEY)).find(x=>x.id===id);
    document.getElementById('mapModal').style.display = 'flex';
    setTimeout(() => {
        if (!map) { map = L.map('map').setView([r.points[0].lat, r.points[0].lon], 16); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
        map.invalidateSize();
        if (polyline) map.removeLayer(polyline);
        polyline = L.polyline(r.points.map(p => [p.lat, p.lon]), { color: '#ff6a00', weight: 5 }).addTo(map);
        map.fitBounds(polyline.getBounds());
    }, 300);
}
function closeMap() { document.getElementById('mapModal').style.display = 'none'; }
function deleteRec(id) { if(confirm("刪除紀錄？")) { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)).filter(x=>x.id!==id); localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); renderHistory(); } }
window.onload = init;
</script>
</body>
</html>
