<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>跑步教練 V5.5.0 - 模式整合版</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root { --primary: #ff6a00; --bg: #f0f2f5; --card: #ffffff; --danger: #e74c3c; --success: #2ecc71; --info: #3498db; --dark: #2c3e50; --note: #9b59b6; }
body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 5px; }
.card { background: var(--card); border-radius: 12px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
h2 { text-align:center; color:var(--primary); margin:5px 0; font-size: 1.2rem; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { background: #f8f9fa; padding: 8px 2px; border: 1px solid #dee2e6; color: #555; }
td { padding: 6px 2px; border: 1px solid #dee2e6; text-align: center; }
input { width: 90%; padding: 8px 0; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
/* 跑速字體放大 */
.pace-text { color: var(--primary); font-weight: bold; font-family: monospace; font-size: 1.1rem; }
.big-val { font-size: 6.5rem; font-weight: 900; color: var(--primary); font-family: monospace; line-height: 1; margin: 10px 0; }
.btn-action { flex: 1; padding: 18px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; color: #fff; cursor: pointer; }

/* 模式選擇彈窗 */
#modeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 50000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
.btn-mode { width: 80%; padding: 40px 20px; font-size: 1.5rem; font-weight: bold; color: white; border: none; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

/* 隱藏/顯示邏輯 */
.mode-interval { display: none; }
.mode-general { display: none; }

#trainingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
#noteModal, #mapModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 30000; justify-content: center; align-items: center; }
#mapModal { background: white; flex-direction: column; }
#map { flex: 1; width: 100%; }
.note-box { background: white; width: 85%; border-radius: 15px; padding: 20px; }
#noteArea { width: 100%; height: 150px; margin-top: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
.history-card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
.history-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.btn-sm { flex: 1; min-width: 50px; padding: 10px 2px; font-size: 11px; border-radius: 6px; border: none; color: white; font-weight: bold; }
.control-row { padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
#lockOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; flex-direction: column; justify-content: center; align-items: center; }
</style>
</head>
<body>

<div id="modeOverlay">
    <h2>請選擇跑步模式</h2>
    <button class="btn-mode" style="background: var(--primary);" onclick="selectMode('interval')">🏃 間歇訓練</button>
    <button class="btn-mode" style="background: var(--info);" onclick="selectMode('general')">🏃 一般跑步</button>
</div>

<div id="noteModal"><div class="note-box"><h3>📝 編輯跑步備註</h3><textarea id="noteArea"></textarea><div style="display:flex; gap:10px; margin-top:15px;"><button onclick="closeNote()" style="flex:1; padding:12px; background:#888; color:white; border:none; border-radius:8px;">取消</button><button onclick="saveNote()" style="flex:1; padding:12px; background:var(--success); color:white; border:none; border-radius:8px;">儲存</button></div></div></div>

<div id="mapModal">
    <div style="padding:15px; background:var(--primary); color:white; text-align:center; font-weight:bold; width:100%;">運動軌跡回顧</div>
    <div id="map"></div>
    <button onclick="closeMap()" style="padding:15px; width:100%; background:#444; color:white; border:none;">關閉地圖</button>
</div>

<div id="trainingOverlay">
    <div id="lockOverlay"><div style="border:3px solid var(--primary); padding:30px; border-radius:50px; font-size:1.5rem;">🔒 長按解鎖</div></div>
    <div id="statusTop" style="font-size:2.5rem; color:var(--success); font-weight:bold;">● 準備中</div>
    <div id="phaseDetail" style="font-size:1.4rem; color:#ffeb3b; margin: 10px 0;">--</div>
    <div id="bigDistance" class="big-val">0.000</div>
    <div id="soundIndicator" style="color:var(--info); margin-bottom:10px;">第 1 公里 (正相音效)</div>
    <div style="display:flex; width:100%; justify-content:space-around; margin: 15px 0;">
        <div><div style="color:#888; font-size:0.9rem;">配速</div><div id="bigPace" style="font-size:2.5rem; font-family:monospace;">--:--</div></div>
        <div><div style="color:#888; font-size:0.9rem;">時間</div><div id="bigElapsed" style="font-size:2.5rem; font-family:monospace;">00:00</div></div>
    </div>
    <div style="display:flex; gap:10px; width:100%;">
        <button class="btn-action" style="background:var(--note);" onclick="enableLock()">開啟鎖定</button>
        <button class="btn-action" style="background:var(--danger);" onclick="stopAndSave()">結束儲存</button>
    </div>
</div>

<div class="card">
  <h2 id="appTitle">🏃 跑步教練 V5.5.0</h2>
  
  <div class="mode-interval">
      <table>
        <thead><tr><th>階段</th><th>BPM</th><th>秒數</th><th>距離(m)</th><th>跑速</th></tr></thead>
        <tbody id="configRows"></tbody>
      </table>
      <div class="control-row">
        <span>循環組數：<input id="loopCount" type="number" oninput="uiUpdate()" style="width:45px;"> 組</span>
        <span style="font-size:12px; text-align:right;">預計：<b id="totalPlanTime" style="color:var(--primary)">0</b>分 / <b id="totalPlanDist" style="color:var(--info)">0</b>km</span>
      </div>
  </div>

  <div class="mode-general">
      <div style="background:#f8f9fa; padding:15px; border-radius:10px; border:1px solid #dee2e6;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <b>節拍 (BPM)</b> <input type="number" id="genBPM" value="180" oninput="uiUpdate()" style="width:100px;">
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
              <b>預計里程 (m)</b> <input type="number" id="genDist" value="5000" oninput="uiUpdate()" style="width:100px;">
          </div>
      </div>
  </div>

  <div class="control-row" style="border-top:1px dashed #eee; padding-top:10px; margin-top:10px;">
    <span>GPS門檻：<b id="baseThresDisp">0.32</b>m</span>
    <div><button onclick="adjThres(-1)" style="padding:5px 12px;">－</button><button onclick="adjThres(1)" style="padding:5px 12px;">＋</button></div>
  </div>
  
  <div style="display:flex; gap:10px; margin-top:10px;">
      <button onclick="toggleStart(true)" class="btn-action" style="background:var(--primary);">1 達標後儲存</button>
      <button onclick="toggleStart(false)" class="btn-action" style="background:var(--info);">2 達標後續跑</button>
  </div>
  <button onclick="location.reload()" style="width:100%; margin-top:10px; padding:8px; background:#eee; border:none; border-radius:8px; font-size:12px; color:#666;">↺ 切換訓練模式</button>
</div>

<div class="card"><strong>歷史紀錄</strong><div id="historyContainer"></div></div>

<script>
const CONFIG_KEY = 'run_config_v550';
const HISTORY_KEY = 'run_history_v464';
const PHASES = ["熱身", "間歇", "衝刺", "恢復", "舒緩"];
let currentMode = 'interval';
let config = { bpm:[180,205,215,195,180], sec:[180,60,60,120,180], dist:[400,400,400,400,400], loops:8, threshold:0.32, genBPM:180, genDist:5000 };
let isRunning = false, totalDist = 0, elapsedSec = 0, audioCtx = null, timerId = null, watchId = null, trackPoints = [], currentEditingId = null;
let currentPhaseIdx = 0, startNote = { location: "獲取中...", weather: "獲取中..." };
let map = null, polyline = null;

function selectMode(m) {
    currentMode = m;
    document.getElementById('modeOverlay').style.display = 'none';
    if(m === 'interval') {
        document.querySelectorAll('.mode-interval').forEach(e => e.style.display = 'block');
        document.getElementById('appTitle').innerText = "🏃 間歇訓練 (亞索800)";
    } else {
        document.querySelectorAll('.mode-general').forEach(e => e.style.display = 'block');
        document.getElementById('appTitle').innerText = "🏃 一般跑步模式";
    }
    uiUpdate();
}

function init() {
    const saved = localStorage.getItem(CONFIG_KEY);
    if(saved) Object.assign(config, JSON.parse(saved));
    
    let html = "";
    PHASES.forEach((p, i) => {
        html += `<tr><td><b>${p}</b></td>
        <td><input type="number" id="bpm_${i}" oninput="uiUpdate()"></td>
        <td><input type="number" id="sec_${i}" oninput="uiUpdate()"></td>
        <td><input type="number" id="dist_${i}" oninput="uiUpdate()"></td>
        <td class="pace-text" id="pace_${i}">--</td></tr>`;
    });
    document.getElementById('configRows').innerHTML = html;
    PHASES.forEach((p, i) => {
        document.getElementById(`bpm_${i}`).value = config.bpm[i];
        document.getElementById(`sec_${i}`).value = config.sec[i];
        document.getElementById(`dist_${i}`).value = config.dist[i];
    });
    document.getElementById('loopCount').value = config.loops;
    document.getElementById('genBPM').value = config.genBPM;
    document.getElementById('genDist').value = config.genDist;
    renderHistory();
}

function uiUpdate() {
    PHASES.forEach((p, i) => {
        config.bpm[i] = +document.getElementById(`bpm_${i}`).value || 0;
        config.sec[i] = +document.getElementById(`sec_${i}`).value || 0;
        config.dist[i] = +document.getElementById(`dist_${i}`).value || 0;
        if(config.sec[i] > 0 && config.dist[i] > 0) {
            let pS = config.sec[i] / (config.dist[i]/1000);
            document.getElementById(`pace_${i}`).innerText = formatTime(Math.floor(pS));
        } else { document.getElementById(`pace_${i}`).innerText = "--"; }
    });
    config.loops = +document.getElementById('loopCount').value || 1;
    config.genBPM = +document.getElementById('genBPM').value;
    config.genDist = +document.getElementById('genDist').value;
    document.getElementById('baseThresDisp').innerText = config.threshold.toFixed(2);
    
    let totalT = config.sec[0] + ((config.sec[1]+config.sec[2]+config.sec[3])*config.loops) + config.sec[4];
    let totalD = config.dist[0] + ((config.dist[1]+config.dist[2]+config.dist[3])*config.loops) + config.dist[4];
    document.getElementById('totalPlanTime').innerText = (totalT/60).toFixed(1);
    document.getElementById('totalPlanDist').innerText = (totalD/1000).toFixed(2);
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
}

async function toggleStart(isAuto) {
    isRunning = true; trackPoints = []; 
    document.getElementById('trainingOverlay').style.display = 'flex';
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    elapsedSec = 0; totalDist = 0;
    timerId = setInterval(() => { elapsedSec++; document.getElementById('bigElapsed').innerText = formatTime(elapsedSec); }, 1000);
    startGPS();

    if(currentMode === 'interval') {
        // 間歇模式流程
        await runPhase(0, PHASES[0], config.sec[0], config.bpm[0]); 
        for(let j=0; j<config.loops; j++) {
            if(!isRunning) break;
            await runPhase(1, `間歇${j+1}`, config.sec[1], config.bpm[1]); 
            await runPhase(2, `衝刺${j+1}`, config.sec[2], config.bpm[2]); 
            await runPhase(3, `恢復${j+1}`, config.sec[3], config.bpm[3]);
        }
        if(isRunning) await runPhase(4, PHASES[4], config.sec[4], config.bpm[4]);
    } else {
        // 一般模式流程
        document.getElementById('statusTop').innerText = "● 一般跑步";
        while(isRunning) {
            if(isAuto && totalDist >= config.genDist) break;
            document.getElementById('phaseDetail').innerText = `目標 ${config.genDist}m | 節拍 ${config.genBPM}`;
            await playCycleBeep(config.genBPM, 0); 
        }
    }

    if(isRunning) {
        if(isAuto) stopAndSave();
        else {
            document.getElementById('statusTop').innerText = "● 續跑中";
            let lastBPM = currentMode === 'interval' ? config.bpm[4] : config.genBPM;
            while(isRunning) { await playCycleBeep(lastBPM, 4); }
        }
    }
}

async function runPhase(idx, label, duration, bpm) {
    if(!isRunning) return;
    currentPhaseIdx = idx; // 確保節拍器知道現在是哪個階段
    document.getElementById('statusTop').innerText = "● " + label;
    let end = Date.now() + duration * 1000;
    while(Date.now() < end && isRunning) {
        let rem = Math.round((end - Date.now())/1000);
        document.getElementById('phaseDetail').innerText = `節拍 ${bpm} | 剩 ${rem} 秒`;
        await playCycleBeep(bpm, idx);
    }
}

async function playCycleBeep(bpm, phaseIdx) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    
    let km = Math.floor(totalDist / 1000);
    let isOddPhase = (phaseIdx % 2 === 0);
    if (km % 2 !== 0) isOddPhase = !isOddPhase; // 每公里反轉音頻
    
    document.getElementById('soundIndicator').innerText = `第 ${km+1} 公里 (${(km%2!==0)?'音頻反轉':'正相音效'})`;
    o.frequency.value = isOddPhase ? 650 : 1050;
    g.gain.setValueAtTime(isOddPhase ? 0.7 : 0.4, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    o.start(); o.stop(audioCtx.currentTime + 0.1);
    await new Promise(r => setTimeout(r, 60000/bpm));
}

/* --- GPS 與 地圖邏輯 (同 V5.4.2) --- */
function startGPS() {
    let last = null;
    watchId = navigator.geolocation.watchPosition(p => {
        const { latitude: lat, longitude: lon, accuracy } = p.coords;
        if (!last) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`).then(res=>res.json()).then(d=>startNote.location=d.display_name.split(',')[0]);
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`).then(res=>res.json()).then(d=>startNote.weather=`氣溫 ${d.current_weather.temperature}°C`);
        }
        if(accuracy < 60) {
            if(last) {
                let d = haversine(last.lat, last.lon, lat, lon);
                if(d > config.threshold && d < 50) {
                    totalDist += d; trackPoints.push({lat, lon, time: new Date().toISOString()});
                    document.getElementById('bigDistance').innerText = (totalDist/1000).toFixed(3);
                    if(totalDist > 5) document.getElementById('bigPace').innerText = formatTime(Math.floor(elapsedSec/(totalDist/1000)));
                }
            }
            last = {lat, lon};
        }
    }, null, {enableHighAccuracy:true});
}

function stopAndSave() {
    isRunning = false; clearInterval(timerId); navigator.geolocation.clearWatch(watchId);
    if(totalDist > 0) {
        const recs = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        recs.unshift({ id: Date.now(), date: new Date().toLocaleString(), dist: (totalDist/1000).toFixed(3), time: formatTime(elapsedSec), points: trackPoints, threshold: config.threshold.toFixed(2), note: `📍 起點：${startNote.location}\n☀️ 天氣：${startNote.weather}\n模式：${currentMode==='interval'?'間歇':'一般'}` });
        localStorage.setItem(HISTORY_KEY, JSON.stringify(recs));
    }
    location.reload();
}

function renderHistory() {
    const recs = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    document.getElementById('historyContainer').innerHTML = recs.map(r => `
        <div class="history-card">
            <div style="font-size:11px; color:#888; display:flex; justify-content:space-between;">
                <span>📅 ${r.date}</span><span>📡 GPS: ${r.threshold}m</span>
            </div>
            <div style="margin:5px 0;"><b style="font-size:1.2rem; color:var(--primary);">🏃 ${r.dist} km | ⏱️ ${r.time}</b></div>
            <div style="font-size:12px; color:#666; background:#f9f9f9; padding:5px; border-radius:4px; white-space:pre-wrap;">${r.note||'無備註'}</div>
            <div class="history-btns">
                <button class="btn-sm" style="background:var(--info);" onclick="viewTrack(${r.id})">軌跡</button>
                <button class="btn-sm" style="background:var(--note);" onclick="editNote(${r.id})">備註</button>
                <button class="btn-sm" style="background:var(--success);" onclick="editDist(${r.id})">修正</button>
                <button class="btn-sm" style="background:var(--danger);" onclick="deleteRec(${r.id})">刪除</button>
            </div>
        </div>
    `).join('');
}

function viewTrack(id) {
    const r = JSON.parse(localStorage.getItem(HISTORY_KEY)).find(r => r.id === id);
    if (!r.points || r.points.length < 2) return alert("點位不足");
    document.getElementById('mapModal').style.display = 'flex';
    setTimeout(() => {
        if (!map) {
            map = L.map('map').setView([r.points[0].lat, r.points[0].lon], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        } else { map.invalidateSize(); }
        if (polyline) map.removeLayer(polyline);
        polyline = L.polyline(r.points.map(p => [p.lat, p.lon]), { color: '#ff6a00', weight: 5 }).addTo(map);
        map.fitBounds(polyline.getBounds());
    }, 300);
}

function closeMap() { document.getElementById('mapModal').style.display = 'none'; }
function editDist(id) { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)); let idx = recs.findIndex(r => r.id === id); let newVal = prompt("修正里程 (km):", recs[idx].dist); if(newVal) { recs[idx].dist = parseFloat(newVal).toFixed(3); localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); renderHistory(); } }
function editNote(id) { currentEditingId = id; document.getElementById('noteArea').value = JSON.parse(localStorage.getItem(HISTORY_KEY)).find(r => r.id === id).note || ""; document.getElementById('noteModal').style.display = 'flex'; }
function saveNote() { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)); recs.find(r => r.id === currentEditingId).note = document.getElementById('noteArea').value; localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); closeNote(); renderHistory(); }
function closeNote() { document.getElementById('noteModal').style.display = 'none'; }
function deleteRec(id) { if(confirm("確定刪除？")) { let recs = JSON.parse(localStorage.getItem(HISTORY_KEY)).filter(r => r.id !== id); localStorage.setItem(HISTORY_KEY, JSON.stringify(recs)); renderHistory(); } }
function adjThres(v) { config.threshold = Math.max(0.01, config.threshold + v*0.01); uiUpdate(); }
function enableLock() { document.getElementById('lockOverlay').style.display = 'flex'; }
document.getElementById('lockOverlay').addEventListener('touchstart', e => {
    let t = setTimeout(()=> document.getElementById('lockOverlay').style.display='none', 2000);
    document.getElementById('lockOverlay').addEventListener('touchend', ()=> clearTimeout(t), {once:true});
});
function formatTime(s) { if(!s||s<=0) return "00:00"; return Math.floor(s/60).toString().padStart(2,'0')+":"+(s%60).toString().padStart(2,'0'); }
function haversine(lat1,lon1,lat2,lon2) { const R=6371000; const dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
window.onload = init;
</script>
</body>
</html>
