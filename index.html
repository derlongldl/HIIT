<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>跑步教練 V5.6.3 - 顯示完全修復版</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root { --primary: #ff6a00; --bg: #f0f2f5; --card: #ffffff; --danger: #e74c3c; --success: #2ecc71; --info: #3498db; --dark: #2c3e50; --note: #9b59b6; }
body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 5px; }
.card { background: var(--card); border-radius: 12px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
h2 { text-align:center; color:var(--primary); margin:5px 0; font-size: 1.2rem; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { background: #f8f9fa; padding: 8px 2px; border: 1px solid #dee2e6; color: #555; }
td { padding: 6px 2px; border: 1px solid #dee2e6; text-align: center; }
input { width: 90%; padding: 8px 0; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
.pace-text { color: var(--primary); font-weight: bold; font-family: monospace; font-size: 1.25rem; }
.big-val { font-size: 6rem; font-weight: 900; color: var(--primary); font-family: monospace; line-height: 1; margin: 10px 0; }
.btn-action { padding: 18px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; color: #fff; cursor: pointer; }
#modeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
.btn-mode { width: 80%; padding: 35px 20px; font-size: 1.4rem; font-weight: bold; color: white; border: none; border-radius: 20px; }
#trainingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
.bottom-bar { position: absolute; bottom: 30px; left: 20px; right: 20px; }
#mapModal, #noteModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 30000; justify-content: center; align-items: center; }
#map { width: 100%; height: 80%; background: white; }
.note-box { background: white; width: 85%; border-radius: 15px; padding: 20px; color: #333; }
#noteArea { width: 100%; height: 120px; margin-top: 10px; padding: 8px; font-size: 14px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
.history-card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
.history-btns { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.btn-sm { flex: 1; min-width: 55px; padding: 8px 2px; font-size: 11px; border-radius: 6px; border: none; color: white; font-weight: bold; }
.switch-container { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px dashed #eee; }
.switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
.slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: var(--primary); }
input:checked + .slider:before { transform: translateX(20px); }
</style>
</head>
<body>

<div id="modeOverlay" style="display:none;">
    <h2>🏃 請選擇跑步模式</h2>
    <button class="btn-mode" style="background: var(--primary);" onclick="selectMode('interval')">亞索 800 (間歇)</button>
    <button class="btn-mode" style="background: var(--info);" onclick="selectMode('general')">一般練跑模式</button>
</div>

<div id="noteModal"><div class="note-box"><h3>📝 訓練備註</h3><textarea id="noteArea"></textarea><div style="display:flex; gap:10px; margin-top:15px;"><button onclick="closeNote()" style="flex:1; padding:10px;">取消</button><button onclick="saveNote()" style="flex:1; padding:10px; background:var(--success); color:white; border:none; border-radius:8px;">儲存</button></div></div></div>
<div id="mapModal" style="flex-direction:column;"><div id="map"></div><button onclick="closeMap()" style="padding:15px; width:100%; background:#444; color:white; border:none;">關閉軌跡</button></div>

<div id="trainingOverlay">
    <div id="statusTop" style="font-size:2rem; color:var(--success); font-weight:bold;">● 準備中</div>
    <div id="phaseDetail" style="font-size:1.2rem; color:#ffeb3b; margin: 5px 0;">--</div>
    <div id="bigDistance" class="big-val">0.000</div>
    <div id="soundIndicator" style="color:var(--info); font-size:0.9rem;">等待 GPS...</div>
    <div style="display:flex; width:100%; justify-content:space-around; margin: 10px 0; text-align:center;">
        <div><div style="color:#888; font-size:0.8rem;">平均配速</div><div id="bigPaceAvg" style="font-size:1.8rem; font-family:monospace;">--:--</div></div>
        <div><div style="color:#ffeb3b; font-size:0.8rem;">公里配速</div><div id="bigPaceCur" style="font-size:1.8rem; font-family:monospace; color:#ffeb3b;">--:--</div></div>
        <div><div style="color:#888; font-size:0.8rem;">跑步時間</div><div id="bigElapsed" style="font-size:1.8rem; font-family:monospace;">00:00</div></div>
    </div>
    <div class="bottom-bar"><button id="saveBtn" class="btn-action" style="width:100%; background:var(--danger);" onclick="stopAndSave()">■ 結束並儲存紀錄</button></div>
</div>

<div class="card">
  <h2>跑步教練 V5.6.3</h2>
  <div id="intervalTable" style="display:none;">
      <table>
        <thead><tr><th>階段</th><th>BPM</th><th>秒數</th><th>距離(m)</th><th>跑速</th></tr></thead>
        <tbody id="configRows"></tbody>
      </table>
      <div class="control-row" style="display:flex; justify-content:space-between; margin:10px 0; font-size:13px;">
        <span>循環：<input id="loopCount" type="number" oninput="uiUpdate()" style="width:40px;"> 組</span>
        <span style="color:#666;">預計：<b id="totalPlanTime">0</b>分 / <b id="totalPlanDist">0</b>km</span>
      </div>
      <div style="text-align:right; font-size:13px; color:var(--primary); font-weight:bold; margin-bottom:5px;">
        預計總跑速：<span id="totalPlanPace">--:--</span>
      </div>
  </div>
  <div id="generalTable" style="display:none;">
      <div style="background:#f8f9fa; padding:10px; border-radius:10px;">
          <table style="table-layout: auto;">
